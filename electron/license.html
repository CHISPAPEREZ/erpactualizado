<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activación de Licencia - SuperMarket ERP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        .logo {
            width: 60px;
            height: 60px;
            background: #3b82f6;
            border-radius: 12px;
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }
        
        h1 {
            color: #1f2937;
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
        }
        
        .subtitle {
            color: #6b7280;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        
        .form-group {
            margin-bottom: 1rem;
            text-align: left;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #374151;
        }
        
        input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        
        input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        
        .machine-info {
            background: #f3f4f6;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.8rem;
            color: #6b7280;
        }
        
        button {
            width: 100%;
            padding: 0.75rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        button:hover {
            background: #2563eb;
        }
        
        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
        
        .error {
            color: #dc2626;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }
        
        .success {
            color: #059669;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }
        
        .demo-serials {
            background: #fef3c7;
            border: 1px solid #f59e0b;
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
            text-align: left;
        }
        
        .demo-serials h3 {
            color: #92400e;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }
        
        .demo-serials code {
            display: block;
            background: #fffbeb;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            margin: 0.25rem 0;
            color: #92400e;
            cursor: pointer;
        }
        
        .demo-serials code:hover {
            background: #fef3c7;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">SM</div>
        <h1>SuperMarket ERP</h1>
        <p class="subtitle">Ingresa tu clave de licencia para activar el software</p>
        
        <div class="machine-info">
            <strong>ID de Máquina:</strong> <span id="machineId">Cargando...</span><br>
            <strong>Versión:</strong> <span id="version">1.0.0</span>
        </div>
        
        <form id="licenseForm">
            <div class="form-group">
                <label for="serial">Clave de Licencia:</label>
                <input 
                    type="text" 
                    id="serial" 
                    placeholder="SMERP-XXXXX-XXXXX-XXXXX"
                    maxlength="23"
                    style="text-transform: uppercase;"
                    required
                >
            </div>
            
            <button type="submit" id="activateBtn">Activar Licencia</button>
            
            <div id="message"></div>
        </form>
        
        <div class="demo-serials">
            <h3>🔑 Seriales de Demostración:</h3>
            <code onclick="fillSerial(this)">SMERP-ADMIN-12345-DEMO1</code>
            <code onclick="fillSerial(this)">SMERP-TRIAL-54321-DEMO2</code>
            <code onclick="fillSerial(this)">SMERP-FULL1-ABCDE-FGHIJ</code>
        </div>
    </div>

    <script>
        let machineInfo = null;
        
        // Cargar información de la máquina
        async function loadMachineInfo() {
            try {
                machineInfo = await window.electronAPI.getMachineInfo();
                document.getElementById('machineId').textContent = machineInfo.machineId;
                document.getElementById('version').textContent = machineInfo.version;
            } catch (error) {
                console.error('Error loading machine info:', error);
            }
        }
        
        // Formatear serial mientras se escribe
        document.getElementById('serial').addEventListener('input', function(e) {
            let value = e.target.value.replace(/[^A-Z0-9]/g, '');
            let formatted = '';
            
            for (let i = 0; i < value.length; i++) {
                if (i === 5 || i === 10 || i === 15) {
                    formatted += '-';
                }
                formatted += value[i];
            }
            
            e.target.value = formatted;
        });
        
        // Llenar serial desde demo
        function fillSerial(element) {
            document.getElementById('serial').value = element.textContent;
        }
        
        // Manejar envío del formulario
        document.getElementById('licenseForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const serial = document.getElementById('serial').value.trim();
            const messageDiv = document.getElementById('message');
            const activateBtn = document.getElementById('activateBtn');
            
            if (!serial) {
                messageDiv.innerHTML = '<div class="error">Por favor ingresa una clave de licencia</div>';
                return;
            }
            
            activateBtn.disabled = true;
            activateBtn.textContent = 'Validando...';
            messageDiv.innerHTML = '';
            
            try {
                const result = await window.electronAPI.validateLicense(serial);
                
                if (result.success) {
                    messageDiv.innerHTML = `<div class="success">${result.message}</div>`;
                    setTimeout(() => {
                        // La ventana se cerrará automáticamente
                    }, 1500);
                } else {
                    messageDiv.innerHTML = `<div class="error">${result.message}</div>`;
                }
            } catch (error) {
                messageDiv.innerHTML = '<div class="error">Error al validar la licencia</div>';
                console.error('License validation error:', error);
            } finally {
                activateBtn.disabled = false;
                activateBtn.textContent = 'Activar Licencia';
            }
        });
        
        // Cargar información al iniciar
        loadMachineInfo();
    </script>
</body>
</html>
